version = "1.0"

[main]
name = "Configuration VPN"

[main.nordvpn]
name = "Connexion NordVPN"

[main.nordvpn.nordvpn_token]
ask = "Access Token NordVPN"
type = "password"
help = "Trouvable sur account.nordvpn.com → Manual Setup → Access Token. L'app récupère automatiquement vos clés WireGuard et choisit le meilleur serveur."

[main.nordvpn.country_code]
ask = "Code pays du serveur (optionnel)"
type = "string"
default = ""
help = "Laisser vide pour le meilleur serveur mondial. Exemples : FR, DE, US, NL, CH. Voir la liste complète sur nordvpn.com/fr/servers/."
pattern.regexp = '^[a-zA-Z]{0,2}$'
pattern.error = "Code pays sur 2 lettres maximum (ex: FR) ou laisser vide"

[main.killswitch]
name = "Sécurité"

[main.killswitch.enable_killswitch]
ask = "Activer le killswitch"
type = "boolean"
default = true
help = "Recommandé : bloque qBittorrent si le VPN se déconnecte pour éviter toute fuite d'IP."
