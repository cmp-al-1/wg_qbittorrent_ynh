#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "wg_qbittorrent"
name = "WireGuard pour qBittorrent"

description.en = "Route qBittorrent traffic through a WireGuard VPN (NordVPN, Mullvad, AirVPN…)"
description.fr = "Faire passer le trafic qBittorrent via un VPN WireGuard (NordVPN, Mullvad, AirVPN…)"

version = "1.1~ynh1"

maintainers = []

[upstream]
license = "MIT"
website = "https://www.wireguard.com/"

[integration]
yunohost = ">= 12.0.9"
helpers_version = "2.1"
architectures = "all"
multi_instance = false
ldap = "not_relevant"
sso = "not_relevant"
disk = "10M"
ram.build = "50M"
ram.runtime = "50M"

[install]

[resources]

[resources.system_user]

[resources.install_dir]
dir = "/opt/yunohost/__APP__"

[resources.permissions]

[resources.apt]
packages = "wireguard, iptables"
